{% extends "base.html" %}
{% block title %}Overview - Work Wrapped{% endblock %}
{% block topbar_title %}Overview{% endblock %}

{% block content %}
<section>
    <div id="overview-content">
        <p style="color: var(--text-muted);">Loading your activity…</p>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let currentMonths = 12;

    function formatFetchedAt(iso) {
        if (!iso) return '—';
        try {
            const d = new Date(iso);
            if (isNaN(d.getTime())) return iso;
            const min = Math.floor((new Date() - d) / 60000);
            if (min < 1) return 'just now';
            if (min < 60) return min + ' min ago';
            const h = Math.floor(min / 60);
            if (h < 24) return h + ' h ago';
            return d.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
        } catch (e) { return iso; }
    }

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    async function loadOverview(monthsParam, refresh) {
        let url = monthsParam != null ? '/api/personal?months=' + monthsParam : '/api/personal';
        if (refresh) url += (url.indexOf('?') >= 0 ? '&' : '?') + 'refresh=1';
        const res = await fetch(url);
        if (res.status === 401) { window.location.href = '/login'; return; }
        let data;
        try { data = await res.json(); }
        catch (e) {
            document.getElementById('overview-content').innerHTML = '<p style="color: var(--error);">Could not load data. <a href="javascript:loadOverview(currentMonths, true)">Retry</a>.</p>';
            return;
        }
        if (data.months != null) currentMonths = data.months;
        renderOverview(data);
    }

    function changeTimeRange(months) { loadOverview(parseInt(months, 10)); }

    function renderOverview(data) {
        const t = data.totals || {};
        const user = data.user || {};
        const options = data.time_range_options || [[12, 'Last 12 months']];
        const selectOpts = options.map(([m, label]) => `<option value="${m}" ${(data.months || 12) === m ? 'selected' : ''}>${esc(label)}</option>`).join('');
        const bm = data.busiest_month_cross, bw = data.busiest_week;
        const nudges = data.nudges || [];

        const strip = (bm || bw || data.focus_score_pct != null || data.trend_label)
            ? `<div class="card" style="margin-bottom:1.25rem;"><p style="margin:0; font-size:0.92rem;">${bm ? 'Busiest month: <strong>' + esc(bm.label || bm.month) + '</strong> (' + bm.count + '). ' : ''}${bw ? 'Busiest week: <strong>' + esc(bw.label) + '</strong> (' + bw.count + '). ' : ''}${data.focus_score_pct != null ? 'Focus: <strong>' + data.focus_score_pct + '%</strong> in top 2 areas. ' : ''}${data.trend_label ? 'Trend: <strong>' + esc(data.trend_label) + '</strong>.' : ''}</p></div>`
            : '';

        const navCards = [
            ['/insights', '✦ Insights', 'AI summary, ask your data & trends'],
            ['/goals', '◎ Goals', 'Objectives, targets & snapshots'],
            ['/meetings', '☷ 1:1s', 'Agendas, notes & action items'],
            ['/gerrit', '◆ Gerrit', (t.gerrit || 0) + ' changes'],
            ['/jira', '◆ Jira', (t.jira || 0) + ' tickets'],
            ['/confluence', '◆ Confluence', (t.confluence || 0) + ' pages'],
            ['/slack', '◆ Slack', (t.slack || 0) + ' messages'],
            ['/team', '⚇ Team', 'Aggregated team view'],
        ];

        let html = `
            <div style="display:flex; justify-content:space-between; align-items:flex-end; gap:1rem; flex-wrap:wrap; margin-bottom:1.25rem;">
                <div>
                    <h1 class="hero-greeting">Hi, ${esc(user.name || 'there')} 👋</h1>
                    <p style="color:var(--text-muted); margin:0;">Here's your work at a glance — for reflection, not ranking.</p>
                </div>
                <div style="display:flex; align-items:center; gap:0.5rem;">
                    <label for="time-range-select" style="color:var(--text-muted); font-size:0.85rem;">Range</label>
                    <select id="time-range-select" onchange="changeTimeRange(this.value)">${selectOpts}</select>
                </div>
            </div>

            <div class="stat-grid" style="margin-bottom:1.25rem;">
                <div class="card stat-card"><div class="stat-num">${t.jira || 0}</div><div class="stat-label"><span class="badge badge-jira">Jira</span> tickets</div></div>
                <div class="card stat-card"><div class="stat-num">${t.gerrit || 0}</div><div class="stat-label"><span class="badge badge-gerrit">Gerrit</span> changes</div></div>
                <div class="card stat-card"><div class="stat-num">${t.confluence || 0}</div><div class="stat-label"><span class="badge badge-confluence">Confluence</span> pages</div></div>
                <div class="card stat-card"><div class="stat-num">${t.slack || 0}</div><div class="stat-label"><span class="badge badge-slack">Slack</span> messages</div></div>
            </div>

            ${strip}

            ${nudges.length ? `<div class="card nudge-card" style="margin-bottom:1.25rem;"><h3 style="font-size:0.95rem; margin:0 0 0.5rem;">Reminders</h3><ul style="margin:0; padding-left:1.25rem; font-size:0.9rem; color:var(--text-muted);">${nudges.map(n => '<li>' + esc(n.message || n) + '</li>').join('')}</ul></div>` : ''}

            <h3 class="chart-section-title">Explore</h3>
            <div class="nav-card-grid" style="margin-bottom:1.5rem;">
                ${navCards.map(([href, title, desc]) => `<a class="card nav-card" href="${href}"><div class="nav-card-title">${esc(title)}</div><div class="nav-card-desc">${esc(desc)}</div></a>`).join('')}
            </div>

            <p style="font-size:0.83rem; color:var(--text-muted);">Data as of <span>${formatFetchedAt(data.fetched_at)}</span> · <a href="javascript:loadOverview(currentMonths, true)" style="color:var(--accent);">Refresh</a></p>
        `;
        document.getElementById('overview-content').innerHTML = html;
    }

    loadOverview();
</script>
{% endblock %}
