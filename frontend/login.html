<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Work Wrapped</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'DM Sans', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 2rem;
            line-height: 1.6;
        }

        .login-box {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 2rem 2.25rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .login-box h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .login-box .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text);
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.75;
        }

        .form-group small {
            display: block;
            margin-top: 0.35rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .form-group small a {
            color: var(--accent);
            text-decoration: none;
        }

        .form-group small a:hover {
            text-decoration: underline;
        }

        .error {
            color: var(--error);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            padding: 0.6rem 0.75rem;
            background: rgba(248, 81, 73, 0.08);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--error);
        }

        button[type="submit"] {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.7rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 0.5rem;
            transition: background var(--transition);
        }

        button[type="submit"]:hover {
            background: var(--accent-hover);
        }

        button[type="submit"]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .demo-hint {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .demo-hint code {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.15rem 0.4rem;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .credential-note {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            padding: 0.75rem 1rem;
            background: var(--accent-soft);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--accent);
            line-height: 1.5;
        }

        .credential-note strong {
            color: var(--text);
        }

        .login-logo {
            height: 2rem;
            width: auto;
            margin-bottom: 1rem;
            display: block;
        }

        .form-section-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin: 1.25rem 0 0.5rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.25rem;
            background: var(--bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            padding: 0.25rem;
            margin-bottom: 1.5rem;
        }

        .auth-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.55rem 0.75rem;
            border-radius: calc(var(--radius-sm) - 2px);
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
        }

        .auth-tabs button.active {
            background: var(--accent);
            color: #fff;
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <img src="/static/logo.png" alt="Zenseact" class="login-logo" onerror="this.style.display='none'">
        <h1>Work Wrapped</h1>
        <p class="subtitle">Your engineering activity, beautifully summarized.</p>

        <div class="auth-tabs" role="tablist">
            <button type="button" id="tab-signin" class="{% if active_tab != 'signup' %}active{% endif %}"
                onclick="showPanel('signin')">Sign in</button>
            <button type="button" id="tab-signup" class="{% if active_tab == 'signup' %}active{% endif %}"
                onclick="showPanel('signup')">Sign up</button>
        </div>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <!-- Sign in -->
        <div id="panel-signin" class="auth-panel {% if active_tab != 'signup' %}active{% endif %}">
            <form method="post" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" name="email" placeholder="you@company.com" required
                        value="{{ prefill_email or '' }}">
                </div>
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Sign in</button>
            </form>
        </div>

        <!-- Sign up -->
        <div id="panel-signup" class="auth-panel {% if active_tab == 'signup' %}active{% endif %}">
            <form method="post" action="{{ url_for('signup') }}">
                <div class="form-group">
                    <label for="signup-name">Name</label>
                    <input type="text" id="signup-name" name="name" placeholder="Your name"
                        value="{{ prefill_name or '' }}">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" name="email" placeholder="you@company.com" required
                        value="{{ prefill_email or '' }}">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="At least 8 characters"
                        minlength="8" required>
                </div>
                <div class="form-group">
                    <label for="signup-password2">Confirm password</label>
                    <input type="password" id="signup-password2" name="password2" placeholder="Repeat password"
                        minlength="8" required>
                </div>
                <button type="submit">Create account</button>
            </form>
        </div>

        {% if demo_mode %}
        <a href="{{ url_for('demo_login') }}" class="btn btn-secondary"
            style="width: 100%; margin-top: 0.9rem; text-align: center; text-decoration: none;">View demo (sample
            data)</a>
        {% endif %}

        <p class="demo-hint">
            After signing in, head to <strong>Connections</strong> to link Gerrit, Jira, Confluence and Slack.
        </p>
    </div>

    <script>
        function showPanel(which) {
            document.getElementById('panel-signin').classList.toggle('active', which === 'signin');
            document.getElementById('panel-signup').classList.toggle('active', which === 'signup');
            document.getElementById('tab-signin').classList.toggle('active', which === 'signin');
            document.getElementById('tab-signup').classList.toggle('active', which === 'signup');
        }
    </script>
</body>

</html>
